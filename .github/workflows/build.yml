name: Build C++ Project

on: [push, pull_request]

env:
  # Route vcpkg's binary cache to a local workspace folder for easy CI tracking
  VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/vcpkg_cache

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libopencv-dev

      - name: Cache vcpkg Binaries (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          key: vcpkg-${{ matrix.os }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ matrix.os }}-

      - name: Configure and Build
        shell: bash
        run: |
          if [ "${{ runner.os }}" == "Windows" ]; then
            # CMake automatically reads vcpkg.json and builds dependencies in Manifest Mode
            mkdir -p "$VCPKG_DEFAULT_BINARY_CACHE"
            MSYS_NO_PATHCONV=1 cmake -B build -S . \
              -DCMAKE_TOOLCHAIN_FILE="$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_CXX_FLAGS="/permissive-"
          else
            cmake -B build -S . -DCMAKE_BUILD_TYPE=Release
          fi
          cmake --build build --config Release

      - name: Stage Artifacts (Install)
        shell: bash
        run: |
          # Use CMake's native installation pattern to gather the binary and its dynamic dependencies
          cmake --install build --prefix dist

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electronic-shield-door-${{ matrix.os }}
          # Points strictly to the clean staging directory, ensuring no broken relative paths
          path: dist/
          if-no-files-found: error
