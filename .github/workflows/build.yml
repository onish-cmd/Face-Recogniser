name: Build C++ Project

on: [push, pull_request]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    
    runs-on: ${{ matrix.os }}
    
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libopencv-dev
          
      - name: Install Dependencies (Windows)
        if: runner.os == 'Windows'
        # vcpkg is pre-installed on GitHub runners; we just install the port
        run: vcpkg install opencv4:x64-windows

      - name: Configure CMake
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            cmake -B build -S . -DCMAKE_TOOLCHAIN_FILE=$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake
          else
            cmake -B build -S .
          fi

      - name: Build
        run: cmake --build build --config Release

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-result-${{ runner.os }}
          path: build/
