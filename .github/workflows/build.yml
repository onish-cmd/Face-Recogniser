name: Build C++ Project

on: [push, pull_request]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Cache vcpkg dependencies
        if: matrix.os == 'windows-latest'
        uses: actions/cache@v4
        with:
          path: C:/vcpkg/installed
          key: ${{ matrix.os }}-vcpkg-${{ hashFiles('**/vcpkg.json') }}

      # 2. Linux System Dependencies
      - name: Install Native Linux Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libopencv-dev

      - name: Configure and Build
        shell: bash
        run: |
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
             cmake -B build -S . -DCMAKE_TOOLCHAIN_FILE="C:/vcpkg/scripts/buildsystems/vcpkg.cmake" -DCMAKE_BUILD_TYPE=Release
          else
             cmake -B build -S . -DCMAKE_BUILD_TYPE=Release
          fi
          cmake --build build --config Release
